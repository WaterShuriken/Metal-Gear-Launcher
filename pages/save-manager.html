<div class="save-manager-container text-center">
    <header>
        <h1 class="mb-2">[ SAVE DATA MANAGEMENT ]</h1>
        <p id="active-game-label" class="opacity-50 small mb-4">GAME: ---</p>
    </header>
    
    <div class="save-zones">
        <!-- Left: Save Profiles -->
        <div class="save-column">
            <p class="section-label text-start">[ SAVE PROFILES ]</p>
            <div id="profile-list" class="list-container">
                <!-- Dynamically injected -->
            </div>
            <button class="btn-mgs btn-sm-mgs w-100 mt-3" onclick="window.createNewProfile()">+ NEW PROFILE</button>
        </div>
        
        <!-- Right: Automated Backups -->
        <div class="save-column">
            <p class="section-label text-start">[ SAVES ]</p>
            <div id="backup-list-manager" class="list-container">
                <!-- Dynamically injected -->
            </div>
            <p id="save-state-notice" class="profile-empty text-start mb-0 pt-2"></p>
        </div>
    </div>

    <footer>
        <hr class="theme-divider">
        <button class="btn-mgs btn-sm-mgs w-50" onclick="closeSaveManager()">BACK</button>
    </footer>
</div>

<!-- CREATE PROFILE MODAL -->
<div id="profile-creation-menu" class="mgs-modal-overlay" style="display: none;">
    <div class="mgs-modal-content">
        <h2 class="mb-3">[ CREATE NEW PROFILE ]</h2>
        <div class="input-wrapper mb-4">
            <label class="d-block small mb-1 opacity-50">NAME:</label>
            <input type="text" id="new-profile-input" class="mgs-input" placeholder="e.g., BIG BOSS RUN" maxlength="30"
                onkeydown="if(event.key==='Enter') window.confirmProfileCreation()">
        </div>
        <p id="profile-create-error" class="profile-modal-error"></p>
        <div class="d-flex gap-2">
            <button class="btn-mgs btn-sm-mgs w-100" onclick="window.confirmProfileCreation()">[ CONFIRM ]</button>
            <button class="btn-mgs btn-sm-mgs w-100 btn-danger" onclick="window.closeProfileMenu()">[ CANCEL ]</button>
        </div>
    </div>
</div>

<!-- RENAME PROFILE MODAL -->
<div id="profile-rename-menu" class="mgs-modal-overlay" style="display: none;">
    <div class="mgs-modal-content">
        <h2 class="mb-3">[ RENAME PROFILE ]</h2>
        <div class="input-wrapper mb-4">
            <label class="d-block small mb-1 opacity-50">NEW NAME:</label>
            <input type="text" id="rename-profile-input" class="mgs-input" maxlength="30"
                onkeydown="if(event.key==='Enter') window.confirmProfileRename()">
        </div>
        <p id="profile-rename-error" class="profile-modal-error"></p>
        <div class="d-flex gap-2">
            <button id="profile-rename-confirm-btn" class="btn-mgs btn-sm-mgs w-100" onclick="window.confirmProfileRename()">[ CONFIRM ]</button>
            <button class="btn-mgs btn-sm-mgs w-100 btn-danger" onclick="window.closeRenameMenu()">[ CANCEL ]</button>
        </div>
    </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div id="profile-delete-menu" class="mgs-modal-overlay" style="display: none;">
    <div class="mgs-modal-content">
        <h2 class="mb-3">[ DELETE PROFILE ]</h2>
        <p id="profile-delete-label" class="opacity-75 mb-1" style="font-size:0.75rem;"></p>
        <p class="opacity-50 mb-4" style="font-size:0.65rem;">THIS WILL PERMANENTLY ERASE ALL SAVES AND BACKUPS.</p>
        <div class="d-flex gap-2">
            <button class="btn-mgs btn-sm-mgs w-100 btn-danger" onclick="window.confirmProfileDelete()">[ DELETE ]</button>
            <button class="btn-mgs btn-sm-mgs w-100" onclick="window.closeDeleteMenu()">[ CANCEL ]</button>
        </div>
    </div>
</div>
